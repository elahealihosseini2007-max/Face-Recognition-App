<!DOCTYPE html>
<html lang="fa" dir="rtl">
 <head>
     <meta charset="UFT-8">
     <title>ورود به سامانه</title>
    <style>
        body {font-family: Tahoma, sans-serif; background: #f4f4f9; text-align: center; padding: 50px; }
        .box {background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input {margin: 10px; padding: 10px; width: 200px; display: block; margin-left: auto; margin-right: auto; }
        button {padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }


    </style>

</head>
<body>
    <div class="box">
        <h2>ورود به سامانه تشخیص چهره</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="نام کاربری" required>
            <input type="password" name="password" placeholder="رمز عبور" required>
            <button type="submit">ورود</button>

        </form>

    </div>


</body>
</html>
